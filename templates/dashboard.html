<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetWatch</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h1 class="mb-4">NetWatch Dashboard</h1>

    <div class="row">

        <div class="col-md-3">
            <div class="card border-success">
                <div class="card-body">
                    <h5>Web Server</h5>
                    <p class="text-success">🟢 Online</p>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card border-success">
                <div class="card-body">
                    <h5>Database</h5>
                    <p class="text-success">🟢 Online</p>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card border-warning">
                <div class="card-body">
                    <h5>DNS</h5>
                    <p class="text-warning">🟡 Atenção</p>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card border-danger">
                <div class="card-body">
                    <h5>SMTP</h5>
                    <p class="text-danger">🔴 Offline</p>
                </div>
            </div>
        </div>

    </div>

</div>
